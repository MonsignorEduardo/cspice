name: Release

on:
  push:
    tags:
      - "N*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. N0067)"
        required: true
        type: string

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Meson and Ninja
        run: uv tool install meson && uv tool install ninja

      - name: Setup build
        run: meson setup builddir --prefix=${{ github.workspace }}/dist

      - name: Build and install
        run: ninja -C builddir install

      - name: Package
        run: |
          VERSION=${{ github.event.inputs.tag || github.ref_name }}
          ARCHIVE="cspice-${VERSION}-${{ matrix.label }}.tar.gz"
          # Find libcspice.a wherever meson installed it (lib/ or lib64/ or lib/x86_64-linux-gnu/)
          find ${{ github.workspace }}/dist -type f | sort
          tar czf "${ARCHIVE}" -C ${{ github.workspace }}/dist .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cspice-${{ matrix.label }}
          path: cspice-*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: cspice-*.tar.gz
          generate_release_notes: true
