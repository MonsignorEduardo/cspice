name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install Meson and Ninja
        run: uv tool install meson && uv tool install ninja

      - name: Setup build
        run: meson setup builddir

      - name: Build
        run: ninja -C builddir

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cspice-${{ matrix.label }}
          path: builddir/libcspice.a
